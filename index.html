<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор Водія</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #f4f5f7; --card-bg: #ffffff; --text-color: #1c1c1e; --text-muted: #8e8e93; --accent-color: #ffdd00; --accent-success: #24c17e; --border-radius: 16px; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #121212; --card-bg: #1c1c1e; --text-color: #ffffff; --text-muted: #aaaaaa; } }
        body[data-theme="dark"] { --bg-color: #121212; --card-bg: #1c1c1e; --text-color: #ffffff; --text-muted: #aaaaaa; }
        body[data-theme="light"] { --bg-color: #f4f5f7; --card-bg: #ffffff; --text-color: #1c1c1e; --text-muted: #8e8e93; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 60px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: 0.3s; }
        .app-header { background: var(--card-bg); padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .app-title { font-size: 18px; font-weight: 800; }
        .tabs { display: flex; background: var(--card-bg); padding: 4px; margin: 12px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: var(--text-muted); font-weight: 600; font-size: 12px; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: var(--accent-color); color: #000; box-shadow: 0 2px 6px rgba(255, 221, 0, 0.3); }
        .page { display: none; padding: 0 12px; }
        .page.active { display: block; }
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
        .card-title { font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; }
        .input-block { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .result-total { border-top: 1px solid rgba(0,0,0,0.06); padding-top: 10px; margin-top: 10px; font-size: 20px; font-weight: 800; }
        .btn-main { width: 100%; padding: 14px; background: var(--accent-success); color: white; border: none; border-radius: 12px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .admin-input { width: 80px; padding: 6px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-weight: 600; }
        .car-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .car-card { flex: 0 0 100px; padding: 12px; border-radius: 14px; background: var(--card-bg); text-align: center; border: 2px solid transparent; cursor: pointer; }
        .car-card.active { border-color: var(--accent-color); background: rgba(255,221,0,0.1); }
    </style>
</head>
<body>

<div class="app-header">
    <div class="app-title">🚖 Калькулятор Водія</div>
    <div class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('calc')">Розрахунок</button>
    <button class="tab-btn" onclick="switchTab('branding')">Цілі</button>
    <button class="tab-btn" onclick="switchTab('cash')">💰 Каса</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️</button>
</div>

<div id="page-calc" class="page active">
    <div class="car-selector" id="car-list"></div>
    <div class="card">
        <div class="input-block">
            <span>Кілометри (місто):</span>
            <input type="number" class="admin-input" id="inp-dist" value="0" oninput="recalc()">
        </div>
        <div class="result-total"><span>Разом до сплати:</span><span id="res-total">0 ₴</span></div>
        <div style="color:var(--accent-success); font-weight:700; margin-top:10px;">В кишеню: <span id="res-net">0 ₴</span></div>
        <button class="btn-main" onclick="addToDailyCash()">✅ Додати в касу</button>
    </div>
</div>

<div id="page-cash" class="page">
    <div class="card">
        <div class="card-title">Статистика за сьогодні</div>
        <div class="result-row"><span>Замовлень:</span><span id="cash-orders-count">0</span></div>
        <div class="result-row" style="color:var(--accent-success); font-weight:700;"><span>Чистими:</span><span id="cash-net">0 ₴</span></div>
    </div>
    <button class="reset-btn" onclick="resetDailyCash()">🔄 Обнулити касу</button>
</div>

<script>
    // ... (тут весь ваш JS: recalc, addToDailyCash, updateCashPage, switchTab, автозбереження) ...
    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('taxi_theme', isDark ? 'light' : 'dark');
    }
    
    // Ініціалізація
    updateCashPage();
</script>
</body>
</html>
